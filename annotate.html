<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnnotateMe - Professional Data Annotation Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* Header/Navbar */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: bold;
        }

        .navbar-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .project-info {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
        }

        .progress-mini {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar-mini {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-mini > span {
            fill: rgba(255,255,255,0.5);
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Sidebar - Tools */
        .sidebar-left {
            width: 280px;
            background: #222;
            border-right: 1px solid #333;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .tool-btn {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #333;
            border-color: #667eea;
            color: #667eea;
        }

        .tool-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        /* Canvas Area */
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            position: relative;
        }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            background: #0a0a0a;
            position: relative;
        }

        #canvas {
            max-width: 100%;
            max-height: 100%;
            border: 2px solid #444;
            cursor: crosshair;
            background: white;
        }

        #canvas.draw-mode {
            cursor: crosshair;
        }

        .canvas-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #ccc;
        }

        /* Right Sidebar - Labels & Properties */
        .sidebar-right {
            width: 280px;
            background: #222;
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .labels-list {
            flex: 1;
            margin-bottom: 20px;
        }

        .label-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin-bottom: 6px;
            background: #2a2a2a;
            border-radius: 4px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: all 0.2s;
        }

        .label-item:hover {
            background: #333;
        }

        .label-item.selected {
            background: #667eea;
            border-left-color: #fff;
        }

        .label-color {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .label-name {
            font-size: 12px;
            flex: 1;
        }

        .objects-list {
            background: #2a2a2a;
            border-radius: 4px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .object-item {
            padding: 6px;
            margin-bottom: 4px;
            background: #333;
            border-radius: 3px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .object-item-label {
            color: #667eea;
            font-weight: bold;
        }

        /* Bottom Bar - Frame Navigation */
        .bottom-bar {
            background: #222;
            border-top: 1px solid #333;
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .frame-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .frame-nav button {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .frame-nav button:hover {
            border-color: #667eea;
        }

        .frame-nav button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .frame-info {
            font-size: 12px;
            color: #888;
            min-width: 100px;
        }

        .frame-slider {
            flex: 1;
            max-width: 300px;
        }

        .frame-slider input {
            width: 100%;
        }

        /* Login Page */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .login-btn:hover {
            background: #5568d3;
        }

        /* Projects Dashboard */
        .dashboard-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .dashboard-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .project-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .project-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .project-card p {
            color: #888;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .project-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #ccc;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: #667eea;
            transition: width 0.3s;
        }

        .hidden {
            display: none;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h2>AnnotateMe</h2>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboardPage" class="hidden">
        <div class="app-container">
            <div class="navbar">
                <div class="navbar-brand">AnnotateMe - Projects</div>
                <div class="navbar-right">
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            <div class="dashboard-content">
                <h1 style="margin-bottom: 20px; color: #667eea;">My Projects</h1>
                <div class="projects-grid" id="projectsList"></div>
            </div>
        </div>
    </div>

    <!-- Annotation Page -->
    <div id="annotationPage" class="hidden">
        <div class="app-container">
            <div class="navbar">
                <div class="navbar-brand" id="projectTitle">AnnotateMe</div>
                <div class="navbar-right">
                    <div class="project-info">
                        <div id="frameCounter">Frame 0/0</div>
                    </div>
                    <button class="logout-btn" onclick="backToDashboard()">Back</button>
                </div>
            </div>

            <div class="main-content">
                <!-- Left Sidebar -->
                <div class="sidebar-left">
                    <span class="sidebar-title">Annotation Tools</span>
                    <button class="tool-btn active" id="selectTool" onclick="setTool('select')">✓ Select</button>
                    <button class="tool-btn" id="rectTool" onclick="setTool('rect')">▭ Rectangle</button>
                    <button class="tool-btn" id="polyTool" onclick="setTool('polygon')">⬟ Polygon</button>
                    <button class="tool-btn" id="pointTool" onclick="setTool('point')">● Point</button>

                    <span class="sidebar-title" style="margin-top: 20px;">File</span>
                    <button class="tool-btn" onclick="uploadImage()">📤 Upload Image</button>
                    <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="handleImageUpload(event)">

                    <span class="sidebar-title" style="margin-top: 20px;">Keyboard Shortcuts</span>
                    <div style="font-size: 11px; color: #888; line-height: 1.8;">
                        <div><strong>R</strong> - Rectangle</div>
                        <div><strong>P</strong> - Polygon</div>
                        <div><strong>D</strong> - Point</div>
                        <div><strong>S</strong> - Select</div>
                        <div><strong>Del</strong> - Delete</div>
                        <div><strong>Ctrl+Z</strong> - Undo</div>
                    </div>
                </div>

                <!-- Canvas Area -->
                <div class="canvas-container">
                    <div class="canvas-wrapper">
                        <canvas id="canvas"></canvas>
                        <div class="canvas-info" id="canvasInfo">Image: Load an image to start annotating</div>
                    </div>

                    <!-- Bottom Bar -->
                    <div class="bottom-bar">
                        <div class="frame-nav">
                            <button id="prevBtn" onclick="previousFrame()">← Previous</button>
                            <div class="frame-info">
                                <input type="range" id="frameSlider" class="frame-slider" onchange="jumpToFrame(this.value)">
                            </div>
                            <button id="nextBtn" onclick="nextFrame()">Next →</button>
                        </div>
                        <button class="tool-btn" onclick="saveAnnotations()" style="flex: 0 0 auto;">💾 Save</button>
                    </div>
                </div>

                <!-- Right Sidebar -->
                <div class="sidebar-right">
                    <span class="sidebar-title">Labels</span>
                    <div class="labels-list" id="labelsList"></div>

                    <span class="sidebar-title" style="margin-top: 20px;">Objects</span>
                    <div class="objects-list" id="objectsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let authToken = null;
        let projects = [];
        let currentProject = null;
        let currentTool = 'select';
        let selectedLabel = null;
        let canvas = null;
        let ctx = null;
        let annotations = [];
        let isDrawing = false;
        let startX, startY;
        let currentImageIndex = 0;
        let images = [];

        // Colors for labels
        const labelColors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
            '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#A3E4D7'
        ];

        function login(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('http://localhost:3000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(data => {
                authToken = data.token;
                loadProjects();
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
            })
            .catch(e => alert('Login failed: ' + e.message));
        }

        function logout() {
            authToken = null;
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById('annotationPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
        }

        function backToDashboard() {
            document.getElementById('annotationPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            annotations = [];
            images = [];
        }

        function loadProjects() {
            fetch('http://localhost:3000/api/projects', {
                headers: { 'Authorization': 'Bearer ' + authToken }
            })
            .then(r => r.json())
            .then(data => {
                projects = data;
                renderProjects();
            });
        }

        function renderProjects() {
            const html = projects.map(p => `
                <div class="project-card" onclick="openProject('${p.id}', '${p.name}')">
                    <h3>${p.name}</h3>
                    <p>${p.description}</p>
                    <div class="project-stats">
                        <span>${p.dataType}</span>
                        <span>${p.annotatedItems}/${p.totalItems} items</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" style="width: ${p.progress}%"></div>
                    </div>
                </div>
            `).join('');
            document.getElementById('projectsList').innerHTML = html;
        }

        function openProject(projectId, projectName) {
            currentProject = { id: projectId, name: projectName };
            document.getElementById('projectTitle').textContent = `AnnotateMe - ${projectName}`;
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById('annotationPage').classList.remove('hidden');
            
            // Initialize canvas
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            // Get project labels
            fetch(`http://localhost:3000/api/labels/${projectId}`, {
                headers: { 'Authorization': 'Bearer ' + authToken }
            })
            .then(r => r.json())
            .then(data => renderLabels(data.labels));

            renderObjects();
        }

        function renderLabels(labels) {
            const html = labels.map((label, idx) => `
                <div class="label-item ${!selectedLabel ? (idx === 0 ? 'selected' : '') : ''}" 
                     onclick="selectLabel('${label.name}', '${label.color}')"
                     style="border-left-color: ${label.color}">
                    <div class="label-color" style="background: ${label.color}"></div>
                    <div class="label-name">${label.name}</div>
                </div>
            `).join('');
            document.getElementById('labelsList').innerHTML = html;
            if (!selectedLabel && labels.length > 0) {
                selectedLabel = labels[0].name;
            }
        }

        function selectLabel(name, color) {
            selectedLabel = name;
            document.querySelectorAll('.label-item').forEach(el => el.classList.remove('selected'));
            event.target.closest('.label-item').classList.add('selected');
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tool + 'Tool').classList.add('active');
        }

        function uploadImage() {
            document.getElementById('imageUpload').click();
        }

        function handleImageUpload(event) {
            const files = Array.from(event.target.files);
            images = files;
            currentImageIndex = 0;
            if (images.length > 0) {
                loadImage(0);
            }
        }

        function loadImage(index) {
            const file = images[index];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    document.getElementById('frameCounter').textContent = `Frame ${index + 1}/${images.length}`;
                    document.getElementById('frameSlider').max = images.length - 1;
                    document.getElementById('frameSlider').value = index;
                    document.getElementById('canvasInfo').textContent = `Image: ${file.name} (${img.width}x${img.height})`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function previousFrame() {
            if (currentImageIndex > 0) {
                currentImageIndex--;
                loadImage(currentImageIndex);
            }
        }

        function nextFrame() {
            if (currentImageIndex < images.length - 1) {
                currentImageIndex++;
                loadImage(currentImageIndex);
            }
        }

        function jumpToFrame(index) {
            currentImageIndex = parseInt(index);
            loadImage(currentImageIndex);
        }

        function renderObjects() {
            const html = annotations.map((ann, idx) => `
                <div class="object-item">
                    <span class="object-item-label">${ann.label}</span>
                    <button onclick="deleteAnnotation(${idx})" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:14px;">×</button>
                </div>
            `).join('');
            document.getElementById('objectsList').innerHTML = html || '<div style="color:#888; font-size:11px;">No objects annotated</div>';
        }

        function deleteAnnotation(index) {
            annotations.splice(index, 1);
            redrawCanvas();
            renderObjects();
        }

        function saveAnnotations() {
            alert(`Saved ${annotations.length} annotations for frame ${currentImageIndex + 1}`);
        }

        function redrawCanvas() {
            if (images.length > 0) {
                loadImage(currentImageIndex);
                annotations.forEach(ann => {
                    ctx.strokeStyle = ann.color;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(ann.x, ann.y, ann.width, ann.height);
                    ctx.fillStyle = ann.color;
                    ctx.font = '12px Arial';
                    ctx.fillText(ann.label, ann.x, ann.y - 5);
                });
            }
        }

        // Canvas drawing
        canvas && canvas.addEventListener('mousedown', (e) => {
            if (currentTool === 'select') return;
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        });

        canvas && canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing || currentTool === 'select') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            redrawCanvas();
            
            if (currentTool === 'rect') {
                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 2;
                ctx.strokeRect(startX, startY, x - startX, y - startY);
            }
        });

        canvas && canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;
            
            if (currentTool === 'rect' && selectedLabel) {
                annotations.push({
                    type: 'rect',
                    x: Math.min(startX, endX),
                    y: Math.min(startY, endY),
                    width: Math.abs(endX - startX),
                    height: Math.abs(endY - startY),
                    label: selectedLabel,
                    color: '#667eea'
                });
                renderObjects();
                redrawCanvas();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') setTool('rect');
            if (e.key === 'p' || e.key === 'P') setTool('polygon');
            if (e.key === 'd' || e.key === 'D') setTool('point');
            if (e.key === 's' || e.key === 'S') setTool('select');
            if (e.key === 'Delete') annotations = [], redrawCanvas(), renderObjects();
        });
    </script>
</body>
</html>
