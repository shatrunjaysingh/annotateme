apiVersion: 1

datasources:
  - name: AnnotateMe PostgreSQL
    type: postgres
    uid: annotateme-pg
    url: postgres:5432
    user: ${DB_USER:-annotateme}
    secureJsonData:
      password: ${DB_PASSWORD:-annotateme}
    jsonData:
      database: ${DB_NAME:-annotateme}
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: false
